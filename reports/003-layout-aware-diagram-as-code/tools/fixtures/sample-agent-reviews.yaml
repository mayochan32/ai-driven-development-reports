reviews:
  - mandatory_violations: []
    scores:
      flow_direction: 2
      sequence_clarity: 2
      branch_clarity: 2
      element_placement: 1
      edge_crossings: 2
      label_readability: 2
      visual_hierarchy: 1
      information_density: 2
      symmetry: 1
    evidence:
      flow_direction:
        - 主経路は左から右へ進むが、通知再試行だけが逆方向へ戻る
      sequence_clarity:
        - 注文中止から在庫解放へ向かう長い線が主経路と並走する
      branch_clarity:
        - 合流がAND条件であることを形状から判断できない
      element_placement:
        - 注文中止、在庫解放、注文失敗の関連要素が離れている
      edge_crossings:
        - 大きな交差は少ないが長い迂回線が複数ある
      label_readability:
        - 全体表示では横幅が広く文字が小さくなる
      visual_hierarchy:
        - 正常系、失敗系、補償、非同期処理が同じ見た目である
      information_density:
        - 右側が密集する一方で中央と上下の余白が大きい
      symmetry:
        - 在庫引当と不正審査、配送と通知の対応構造が同じ軸で表現されていない
    misreading_risks:
      - 在庫確保または審査通過の片方だけで決済へ進めるように見える
      - 通知失敗が注文全体の失敗につながるように見える
    revision_instructions:
      - 工程別の領域と明示的なAND合流点を追加する
      - 正常系、補償処理、注文確定後の非同期処理を分離する
    should_revise: true
    revised_mermaid_file: assets/sample-order-flow-medium-improved.mmd

  - mandatory_violations: []
    scores:
      flow_direction: 3
      sequence_clarity: 3
      branch_clarity: 3
      element_placement: 2
      edge_crossings: 3
      label_readability: 3
      visual_hierarchy: 3
      information_density: 2
      symmetry: 3
    evidence:
      flow_direction:
        - 受付から注文確定後処理へ上から下に一貫して進む
      sequence_clarity:
        - 工程番号と領域名によって処理順序を追跡できる
      branch_clarity:
        - 在庫確保と審査通過がAND合流として明示されている
      element_placement:
        - 関連処理は領域内にまとまっているが失敗経路の一部は長い
      edge_crossings:
        - 領域内の線はほぼ交差しない
      label_readability:
        - 文字の切れや重なりがない
      visual_hierarchy:
        - 通常、判断、合流、失敗、非同期処理を形状、色、ラベルで区別している
      information_density:
        - 横方向の密集は解消したが縦長である
      symmetry:
        - 在庫引当と不正審査、配送と通知が対応する枝として対称に配置されている
    misreading_risks:
      - 全体を縮小表示すると領域内の文字が小さくなる
    revision_instructions:
      - 紙面掲載時は全体図と注文確定後処理の詳細図への分割を検討する
    should_revise: false
    revised_mermaid: ""
