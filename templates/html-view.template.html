<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; img-src 'self' data:; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'">
  <title>レポートタイトル</title>
  <style>
    :root {
      --paper: #f7f4ee;
      --surface: #ffffff;
      --ink: #1f2428;
      --muted: #646b73;
      --line: #d8d0c2;
      --blue: #2868a8;
      --green: #2f7d4f;
      --red: #b64242;
      --radius: 8px;
      --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: var(--sans);
      line-height: 1.65;
    }

    header {
      background: #1f2428;
      color: #fff;
      padding: 32px 24px;
    }

    main {
      max-width: 1120px;
      margin: 0 auto;
      padding: 28px 24px 64px;
    }

    h1 {
      max-width: 900px;
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.5rem);
      line-height: 1.12;
      letter-spacing: 0;
    }

    h2 {
      margin-top: 36px;
      font-size: clamp(1.4rem, 2.5vw, 2rem);
      letter-spacing: 0;
    }

    .lead {
      max-width: 840px;
      margin-top: 16px;
      color: #edf0ea;
      font-size: 1.05rem;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .badge {
      display: inline-block;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px 8px;
      color: var(--muted);
      background: #fff;
      font-size: 0.82rem;
      font-weight: 700;
    }

    @media (max-width: 760px) {
      .grid {
        grid-template-columns: 1fr;
      }

      header,
      main {
        padding-left: 16px;
        padding-right: 16px;
      }
    }
  </style>
</head>
<body>
  <header>
    <p class="badge">AI駆動開発 / テーマ別レポート</p>
    <h1>レポートタイトル</h1>
    <p class="lead">このHTMLはMarkdown正本を人間が確認・比較・判断しやすくするための、1ファイル完結の派生ビューです。</p>
  </header>

  <main>
    <section>
      <h2>要点</h2>
      <div class="grid">
        <article class="panel">
          <h3>結論</h3>
          <p>初期表示で伝えるべき結論を書く。</p>
        </article>
        <article class="panel">
          <h3>判断軸</h3>
          <p>読者が比較・判断するための軸を書く。</p>
        </article>
        <article class="panel">
          <h3>注意点</h3>
          <p>仮定、未確認事項、出典への導線を書く。</p>
        </article>
      </div>
    </section>

    <section>
      <h2>詳細</h2>
      <p>必要に応じて、タブ、フィルター、チェックリスト、折りたたみ、JSON出力などを追加する。</p>
    </section>
  </main>
</body>
</html>
